<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>class-slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">
    <h1>Class Slider</h1>
    <p>Slider made with JavaScript class</p>

    <div class="slider" id="slider">
      <div class="slides">
        <div class="slide">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Nature">
          <div class="text">
            <h2>Nature</h2>
            <span>First slide</span>
          </div>
        </div>

        <div class="slide">
          <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Mountains">
          <div class="text">
            <h2>Mountains</h2>
            <span>Second slide</span>
          </div>
        </div>

        <div class="slide">
          <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Sky">
          <div class="text">
            <h2>Sky</h2>
            <span>Third slide</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
